<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romesa Sohail Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Times New Roman", serif;
}

body{
background:#f6f1ff;
min-height:100vh;
display:flex;
align-items:center;
padding-left:10%;
position:relative;
overflow:hidden;
}

/* floral accents */
body::before{
content:"❀";
position:absolute;
top:70px;
right:120px;
font-size:150px;
opacity:0.18;
color:#cdb9ff;
}

body::after{
content:"❁";
position:absolute;
bottom:60px;
right:180px;
font-size:180px;
opacity:0.15;
color:#d7c5ff;
}

.hero{
max-width:850px;
z-index:2;
}

.tag{
display:inline-block;
padding:12px 30px;
border-radius:30px;
background:#e8ddff;
color:#5b3f89;
letter-spacing:2px;
font-size:18px;
margin-bottom:35px;
}

h1{
font-size:72px;
line-height:1.15;
color:#4b2c74;
margin-bottom:28px;
}

.highlight{
color:#7d5cc7;
}

p{
font-size:24px;
line-height:1.7;
max-width:700px;
color:#644d8d;
margin-bottom:50px;
}

a{
text-decoration:none;
display:inline-block;
padding:18px 40px;
border-radius:40px;
margin-right:18px;
font-size:20px;
}

.btn1{
background:#9273df;
color:white;
}

.btn2{
border:2px solid #9273df;
background:#fcfbff;
color:#5b3f89;
}

a:hover{
transform:translateY(-3px);
transition:.3s;
}

</style>
</head>

<body>

<div class="hero">

<div class="tag">
COMPUTER SCIENCE UNDERGRADUATE
</div>

<h1>
Hey There,<br>
It's Me <span class="highlight">Romesa Sohail</span>
</h1>

<p>
A passionate Computer Science undergraduate at
Fatima Jinnah Women University, keenly interested
in creativity and coding.
</p>

<a href="#" class="btn1">View My Projects</a>
<a href="#" class="btn2">Get In Touch</a>

</div>

</body>
</html>
